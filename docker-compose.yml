services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: todo_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - todo_network

  # ─── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/todo_app
    depends_on:
      - mongo
    volumes:
      - uploads:/app/uploads
    networks:
      - todo_network

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - todo_network

# ─── Volumes ────────────────────────────────────────────────
volumes:
  mongo_data:
  uploads:

# ─── Networks ───────────────────────────────────────────────
networks:
  todo_network:
    driver: bridge
